  <text x="190" y="125" fill="#000000" font-size="16" font-weight="bold" text-anchor="middle">模块 A: 数据接入层 (data_fetcher.py)</text>

  <rect x="50" y="160" width="280" height="40" fill="#ffffff" stroke="#000000" stroke-width="1.5" rx="0"/>
