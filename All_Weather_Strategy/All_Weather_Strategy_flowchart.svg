  <text x="430" y="400" fill="#000000" font-size="13">▶ 动态映射：Target RB = 20% × CTA信号</text>
  <text x="430" y="430" fill="#000000" font-size="13">▶ 目标函数：Minimized组合 RC 误差偏差平方和</text>
  <text x="430" y="460" fill="#000000" font-size="13">▶ 模型约束：0 ≤ wi ≤ 40%, L2 正则化</text>
  <text x="430" y="490" fill="#000000" font-size="13">▶ 调仓频率：月末再平衡 (Monthly)</text>

  <rect x="410" y="620" width="340" height="50" fill="#e2efda" stroke="#548235" stroke-width="1.5" rx="0"/>
