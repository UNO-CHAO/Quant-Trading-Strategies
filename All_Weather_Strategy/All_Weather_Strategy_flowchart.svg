  <text x="120" y="290" fill="#000000" font-size="13" text-anchor="middle">增长超预期</text>
  <text x="120" y="310" fill="#555555" font-size="11" text-anchor="middle">(Equity, Commodity)</text>
  
  <text x="260" y="290" fill="#000000" font-size="13" text-anchor="middle">通胀超预期</text>
  <text x="260" y="310" fill="#555555" font-size="11" text-anchor="middle">(Commodity, Gold)</text>
  
  <text x="120" y="350" fill="#000000" font-size="13" text-anchor="middle">增长低于预期</text>
  <text x="120" y="370" fill="#555555" font-size="11" text-anchor="middle">(Bonds)</text>
  
  <text x="260" y="350" fill="#000000" font-size="13" text-anchor="middle">通胀低于预期</text>
  <text x="260" y="370" fill="#555555" font-size="11" text-anchor="middle">(Equity, Bonds)</text>

  <rect x="50" y="410" width="280" height="110" fill="#ffffff" stroke="#000000" stroke-width="1.5" rx="0"/>
