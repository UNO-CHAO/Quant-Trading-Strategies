  <rect x="830" y="180" width="270" height="80" fill="#ffffff" stroke="#000000" stroke-width="1.5" rx="0"/>
  <rect x="830" y="180" width="270" height="30" fill="#ddebf7" stroke="#000000" stroke-width="1.5" rx="0"/>
  <text x="965" y="200" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">波动率控制与资金杠杆管理</text>
  <text x="965" y="240" fill="#000000" font-size="13" text-anchor="middle">设定目标波动率: 6% | 最大杠杆: 2.0x</text>

  <rect x="830" y="310" width="270" height="80" fill="#ffffff" stroke="#000000" stroke-width="1.5" rx="0"/>
  <rect x="830" y="310" width="270" height="30" fill="#fce4d6" stroke="#000000" stroke-width="1.5" rx="0"/>
  <text x="965" y="330" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">场外总收益互换 (TRS) 融资成本</text>
  <text x="965" y="370" fill="#c00000" font-size="13" font-weight="bold" text-anchor="middle">精确扣减: (L - 1) × 3.5% 互换融资成本</text>

  <rect x="830" y="440" width="270" height="110" fill="#ffffff" stroke="#000000" stroke-width="1.5" rx="0"/>
