  <text x="575" y="40" fill="#000000" font-size="24" font-weight="bold" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif">改进型全天候策略 (Risk Parity + CTA择时 + TRS互换) 系统流程图</text>
  <line x1="200" y1="60" x2="950" y2="60" stroke="#000000" stroke-width="2"/>

