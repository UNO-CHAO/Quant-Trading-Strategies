  <text x="670" y="235" fill="#000000" font-size="12" text-anchor="middle">收益率滚动预测</text>
  <text x="670" y="260" fill="#000000" font-size="12" text-anchor="middle">126D EWMA 协方差矩阵</text>

  <rect x="410" y="340" width="340" height="160" fill="#ffffff" stroke="#000000" stroke-width="1.5" rx="0"/>
