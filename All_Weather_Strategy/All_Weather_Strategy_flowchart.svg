  <text x="965" y="460" fill="#000000" font-size="13" font-weight="bold" text-anchor="middle">实证绩效指标评估</text>
  <text x="850" y="495" fill="#000000" font-size="12">✔ 平均杠杆: 0.83x | 夏普: 0.72</text>
  <text x="850" y="520" fill="#000000" font-size="12">✔ 最大回撤: -7.55% | 组合波动: 5.87%</text>

  <rect x="830" y="620" width="270" height="50" fill="#e2efda" stroke="#548235" stroke-width="1.5" rx="0"/>
  <text x="965" y="650" fill="#385723" font-size="14" font-weight="bold" text-anchor="middle">输出: 最终净值与风险贡献 PNG图</text>


